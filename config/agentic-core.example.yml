provider:
  type: openai_compatible
  api_key_env: OPENAI_API_KEY
  base_url_env: OPENAI_COMPATIBLE_BASE_URL
  default_base_url: https://api.openai.com/v1
  model: gpt-5

provider_profiles:
  active: openai
  items:
    openai:
      label: OpenAI
      type: openai_compatible
      api_key_env: OPENAI_API_KEY
      base_url: https://api.openai.com/v1
      model: gpt-5
    deepseek:
      label: DeepSeek
      type: openai_compatible
      api_key_env: DEEPSEEK_API_KEY
      base_url: https://api.deepseek.com/v1
      model: deepseek-chat
    openrouter:
      label: OpenRouter
      type: openai_compatible
      api_key_env: OPENROUTER_API_KEY
      base_url: https://openrouter.ai/api/v1
      model: openai/gpt-4.1
    custom:
      label: Custom
      type: openai_compatible
      api_key_env: CUSTOM_LLM_API_KEY
      base_url: https://api.openai.com/v1
      model: gpt-5

agent:
  system_prompt: |
    You are the Founder Intelligence Agentic Core. Use tools when they help
    ground the analysis in local project artifacts. Preserve uncertainty.
  max_turns: 8
  temperature: 0.2
  timeout_seconds: 60

tools:
  read_signals:
    enabled: true
  read_canonical_items:
    enabled: true
  read_refresh_status:
    enabled: true
  read_latest_run:
    enabled: true
  run_refresh_pipeline:
    enabled: true
  write_agentic_artifact:
    enabled: true

paths:
  signals: data/signals/latest.json
  canonical_items: data/canonical-items/latest.json
  artifact_dir: data/agentic
