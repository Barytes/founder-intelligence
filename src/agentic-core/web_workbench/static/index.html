<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic Core Workbench</title>
    <link rel="stylesheet" href="/agent/static/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel chat-panel">
        <header class="chat-header">
          <div class="top-row">
            <small>Founder Intelligence / Agent</small>
            <nav class="app-nav" aria-label="App navigation">
              <a class="app-nav-link" href="/">信号控制台</a>
              <a class="app-nav-link is-active" href="/agent">Agent Workbench</a>
              <a class="app-nav-link" href="/settings">配置</a>
              <a class="app-nav-link" href="/inspector">运行审计</a>
            </nav>
          </div>
          <h1>Agentic Core</h1>
          <p id="token-status" class="token-status">Checking provider configuration…</p>
        </header>

        <section id="messages" class="messages" aria-live="polite" aria-label="Chat messages"></section>

        <form id="chat-form" class="composer">
          <label for="message-input" class="sr-only">Message</label>
          <textarea
            id="message-input"
            placeholder="Ask about current founder signals"
            rows="3"
          ></textarea>
          <button type="submit" id="chat-submit">Send</button>
        </form>

        <p id="error-banner" class="error-banner" role="status" aria-live="polite" hidden></p>
      </section>

      <aside class="panel side-panel">
        <section class="panel-section">
          <h2>Configuration</h2>
          <div class="config-summary">
            <p id="provider-summary">Loading provider configuration…</p>
            <a class="settings-link" href="/settings">Open settings</a>
          </div>
        </section>

        <section class="panel-section">
          <h2>Tools</h2>
          <div id="tools" class="tools"></div>
        </section>

        <section class="panel-section">
          <h2>Tool Calls</h2>
          <pre id="tool-log" aria-label="Tool call log">[]</pre>
        </section>
      </aside>
    </main>
    <script src="/agent/static/app.js"></script>
  </body>
</html>
