<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic Core Workbench</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel chat-panel">
        <header class="chat-header">
          <h1>Agentic Core</h1>
          <p id="token-status" class="token-status">Checking provider configuration…</p>
        </header>

        <section id="messages" class="messages" aria-live="polite" aria-label="Chat messages"></section>

        <form id="chat-form" class="composer">
          <label for="message-input" class="sr-only">Message</label>
          <textarea
            id="message-input"
            placeholder="Ask about current founder signals"
            rows="3"
          ></textarea>
          <button type="submit" id="chat-submit">Send</button>
        </form>

        <p id="error-banner" class="error-banner" role="status" aria-live="polite" hidden></p>
      </section>

      <aside class="panel side-panel">
        <section class="panel-section">
          <h2>Provider</h2>
          <form id="provider-form" class="provider-form">
            <label class="field">
              Saved Configuration
              <select id="config-select"></select>
            </label>
            <label class="field">
              Provider Type
              <select id="provider-select"></select>
            </label>
            <label class="field">
              Config Name
              <input id="config-name-input" placeholder="Work DeepSeek" />
            </label>
            <label class="field">
              Model
              <input id="model-input" value="—" />
            </label>
            <label class="field">
              API Key
              <input
                id="api-key-input"
                type="password"
                autocomplete="new-password"
                placeholder="sk-..."
              />
            </label>
            <label class="field">
              Base URL
              <input id="base-url-edit-input" placeholder="https://api.openai.com/v1" />
            </label>
            <div class="provider-actions">
              <button type="submit" id="provider-save">Save</button>
              <p id="provider-save-status" class="provider-save-status" role="status" aria-live="polite"></p>
            </div>
          </form>
        </section>

        <section class="panel-section">
          <h2>Tools</h2>
          <div id="tools" class="tools"></div>
        </section>

        <section class="panel-section">
          <h2>Tool Calls</h2>
          <pre id="tool-log" aria-label="Tool call log">[]</pre>
        </section>
      </aside>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
